const DATA=[
  {id:'problem',label:'Problem',r:62,hov:130,

   gd:['#ff6b6b','#e84a5f','#c0392b','#7b1f14'],sum:'Manual LINE notifications across 22 groups — error-prone, inconsistent, and untracked.',
   items:[{t:'Manual every day',b:'Order alerts sent by hand via LINE, creating a high risk of missed messages and human error.'},{t:'Inconsistent comms',b:'Some customers received notifications late or not at all, leading to missed orders.'},{t:'22 groups, no system',b:'Different product schedules across 22 groups with no central system to coordinate.'},{t:'No order tracking',b:'No record of which customers ordered which products — onboarding was impossible.'}]},
  {id:'solution',label:'Solution',r:80,hov:155,
   rings:['radial-gradient(circle,rgba(67,232,176,.14) 55%,transparent 75%)','radial-gradient(circle at 38% 32%,#5eefc0 0%,#1db87a 45%,#0f8a56 100%)','radial-gradient(circle at 62% 68%,#0f8a56 0%,#0a6e42 50%,#054028 100%)','radial-gradient(circle at 50% 50%,#07623a 0%,#022a1a 100%)','radial-gradient(circle at 50% 50%,transparent 82%,rgba(94,239,192,.5) 84%,rgba(255,255,255,.18) 86%,transparent 88%)','radial-gradient(circle at 32% 28%,rgba(255,255,255,.32) 0%,transparent 44%)'],
   gd:['#43e8b0','#1db87a','#0f8a56','#065e3a'],sum:'Shinnion Bot — automated Thai-language order reminders deployed on Railway Cloud.',
   items:[{t:'Railway Cloud bot',b:'Custom LINE chatbot on Railway. Sends Thai-language order reminders automatically.'},{t:'07:00 daily alerts',b:'node-cron fires at 07:00 Thailand time every day, whether or not the admin is available.'},{t:'Products P1–P6',b:'Each product has its own independent schedule. Groups only receive alerts for assigned products.'},{t:'Admin via LINE',b:'Admin manages everything through private LINE commands. Customers only see notifications.'},{t:'Secure credentials',b:'LINE tokens stored in Railway environment variables only — never in source code.'}]},

// ── responsive scale factor ────────────────────────────────────
// Bubbles were designed for ~794px wide. On mobile we scale them down.
function getScale(){
  const w = Math.min(window.innerWidth, 794);
  return Math.min(1, w / 794);
}

const GAP_BASE=8, EXTRA_PUSH_BASE=36;
let scale=getScale();
let GAP=GAP_BASE*scale, EXTRA_PUSH=EXTRA_PUSH_BASE*scale;

function scaledR(d){ return Math.round(d.r * scale); }
function scaledHov(d){ return Math.round(d.hov * scale); }

function packCircles(radii){
  const n=radii.length,angles=[210,270,330,30,90,150].map(a=>a*Math.PI/180),avgR=radii.reduce((s,r)=>s+r,0)/n;
  let pts=radii.map((r,i)=>({x:Math.cos(angles[i])*(avgR+r),y:Math.sin(angles[i])*(avgR+r)}));
  for(let it=0;it<300;it++){let moved=false;for(let a=0;a<n;a++)for(let b=a+1;b<n;b++){const dx=pts[b].x-pts[a].x,dy=pts[b].y-pts[a].y,dist=Math.sqrt(dx*dx+dy*dy)||.001,minD=radii[a]+radii[b]+GAP;if(dist<minD){const push=(minD-dist)/2,nx=dx/dist,ny=dy/dist;pts[a].x-=nx*push;pts[a].y-=ny*push;pts[b].x+=nx*push;pts[b].y+=ny*push;moved=true;}}if(!moved)break;}
  const cx=pts.reduce((s,p)=>s+p.x,0)/n,cy=pts.reduce((s,p)=>s+p.y,0)/n;
  return pts.map(p=>({x:p.x-cx,y:p.y-cy}));
}

let radii,packed,pad,minX,maxX,minY,maxY,SW,SH,OX,OY,BASE,live;
let hovIdx=-1,rafId=null;

function recompute(){
  scale=getScale();
  GAP=GAP_BASE*scale;
  EXTRA_PUSH=EXTRA_PUSH_BASE*scale;
  radii=DATA.map(d=>scaledR(d));
  packed=packCircles(radii);
  const maxHov=Math.max(...DATA.map(d=>scaledHov(d)));
  pad=Math.ceil(maxHov/2)+Math.round(16*scale);
  minX=Math.min(...packed.map((p,i)=>p.x-radii[i]));
  maxX=Math.max(...packed.map((p,i)=>p.x+radii[i]));
  minY=Math.min(...packed.map((p,i)=>p.y-radii[i]));
  maxY=Math.max(...packed.map((p,i)=>p.y+radii[i]));
  SW=maxX-minX+pad*2; SH=maxY-minY+pad*2;
  OX=-minX+pad; OY=-minY+pad;
  BASE=packed.map(p=>({x:p.x+OX,y:p.y+OY}));
  live=BASE.map(p=>({x:p.x,y:p.y}));
  // scale LINE badge
  const logoSz=Math.round(54*scale);
  const logoBr=Math.round(16*scale);
  const ll=document.getElementById('line-logo');
  if(ll){ll.style.width=logoSz+'px';ll.style.height=logoSz+'px';ll.style.borderRadius=logoBr+'px';}
  const ls=document.getElementById('line-svg');
  if(ls){ls.style.width=Math.round(40*scale)+'px';ls.style.height=Math.round(40*scale)+'px';}
  const lw=document.getElementById('line-wm');
  if(lw){lw.style.fontSize=Math.max(8,Math.round(11*scale))+'px';}
}

function positionBadge(){
  const b=document.getElementById('line-badge');
  if(!b)return;
  b.style.left=OX+'px'; b.style.top=OY+'px'; b.style.transform='translate(-50%,-50%)';
}

function lerp(a,b,t){return a+(b-a)*t;}
function eio(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}
function applyBub(el,cx,cy,diam){el.style.width=diam+'px';el.style.height=diam+'px';el.style.left=(cx-diam/2)+'px';el.style.top=(cy-diam/2)+'px';}
function setCore(el,diam){
  const c=el.querySelector('.core');
  const iw=Math.max(12,Math.round(diam*.24)),is=Math.max(9,Math.round(diam*.14)),ls=Math.max(7,Math.round(diam*.10));
  c.querySelector('.ico').style.width=iw+'px';c.querySelector('.ico').style.height=iw+'px';
  const sv=c.querySelector('svg');sv.setAttribute('width',is);sv.setAttribute('height',is);
  const lb=c.querySelector('.lbl');lb.style.fontSize=ls+'px';lb.style.maxWidth=(diam*.75)+'px';
}

function computeTargets(hi){
  const hovR=scaledHov(DATA[hi])/2,tgts=BASE.map(p=>({x:p.x,y:p.y}));
  for(let pass=0;pass<30;pass++){let moved=false;for(let a=0;a<DATA.length;a++)for(let b=a+1;b<DATA.length;b++){const ra=a===hi?hovR:radii[a],rb=b===hi?hovR:radii[b],dx=tgts[b].x-tgts[a].x,dy=tgts[b].y-tgts[a].y,dist=Math.sqrt(dx*dx+dy*dy)||.001,minD=ra+rb+GAP;if(dist<minD){const push=minD-dist,nx=dx/dist,ny=dy/dist;if(a===hi){tgts[b].x+=nx*push;tgts[b].y+=ny*push;}else if(b===hi){tgts[a].x-=nx*push;tgts[a].y-=ny*push;}else{tgts[a].x-=nx*push*.5;tgts[a].y-=ny*push*.5;tgts[b].x+=nx*push*.5;tgts[b].y+=ny*push*.5;}moved=true;}}if(!moved)break;}
  const hx=tgts[hi].x,hy=tgts[hi].y;
  for(let i=0;i<DATA.length;i++){if(i===hi)continue;const dx=tgts[i].x-hx,dy=tgts[i].y-hy,dist=Math.sqrt(dx*dx+dy*dy)||.001,strength=EXTRA_PUSH*(1+(scaledHov(DATA[hi])/2-radii[hi])/radii[hi]);tgts[i].x+=dx/dist*strength;tgts[i].y+=dy/dist*strength;}
  for(let pass=0;pass<20;pass++){let moved=false;for(let a=0;a<DATA.length;a++)for(let b=a+1;b<DATA.length;b++){const ra=a===hi?hovR:radii[a],rb=b===hi?hovR:radii[b],dx=tgts[b].x-tgts[a].x,dy=tgts[b].y-tgts[a].y,dist=Math.sqrt(dx*dx+dy*dy)||.001,minD=ra+rb+GAP;if(dist<minD){const push=minD-dist,nx=dx/dist,ny=dy/dist;if(a===hi){tgts[b].x+=nx*push;tgts[b].y+=ny*push;}else if(b===hi){tgts[a].x-=nx*push;tgts[a].y-=ny*push;}else{tgts[a].x-=nx*push*.5;tgts[a].y-=ny*push*.5;tgts[b].x+=nx*push*.5;tgts[b].y+=ny*push*.5;}moved=true;}}if(!moved)break;}
  return tgts;
}

function animTo(targets,dur,hi){
  const els=Array.from(document.querySelectorAll('.bub')),froms=live.map(p=>({x:p.x,y:p.y})),start=performance.now();
  if(rafId)cancelAnimationFrame(rafId);
  function frame(now){const raw=Math.min((now-start)/dur,1),t=eio(raw);els.forEach((el,i)=>{const cx=lerp(froms[i].x,targets[i].x,t),cy=lerp(froms[i].y,targets[i].y,t),diam=i===hi?scaledHov(DATA[i]):radii[i]*2;applyBub(el,cx,cy,diam);setCore(el,diam);});if(raw<1)rafId=requestAnimationFrame(frame);else{targets.forEach((p,i)=>{live[i].x=p.x;live[i].y=p.y;});rafId=null;}}
  rafId=requestAnimationFrame(frame);
}

function onEnter(i){hovIdx=i;Array.from(document.querySelectorAll('.bub'))[i].classList.add('expanded');animTo(computeTargets(i),340,i);}
function onLeave(i){hovIdx=-1;Array.from(document.querySelectorAll('.bub'))[i].classList.remove('expanded');animTo(BASE.map(p=>({x:p.x,y:p.y})),420,-1);}

function isTouchDevice(){return('ontouchstart' in window)||navigator.maxTouchPoints>0;}

function mk(d,i){
  const el=document.createElement('div');el.className='bub';el.setAttribute('data-id',d.id);
  applyBub(el,BASE[i].x,BASE[i].y,radii[i]*2);
  d.rings.forEach((g,ri)=>{const r=document.createElement('div');r.className=`ring r${ri}`;r.style.background=g;el.appendChild(r);});
  const diam=radii[i]*2,iw=Math.max(12,Math.round(diam*.24)),is=Math.max(9,Math.round(diam*.14)),ls=Math.max(7,Math.round(diam*.10));
  const c=document.createElement('div');c.className='core';
  c.innerHTML=`<div class="ico" style="width:${iw}px;height:${iw}px;"><svg width="${is}" height="${is}" viewBox="0 0 18 18" fill="none">${ICO[d.id]}</svg></div><span class="lbl" style="font-size:${ls}px;max-width:${diam*.75}px;">${d.label}</span>`;
  el.appendChild(c);
  if(isTouchDevice()){
    // on touch: tap once to expand, tap again to open detail
    el.addEventListener('touchend',e=>{
      e.preventDefault();
      if(hovIdx===i){openD(d);}
      else{
        // collapse any previously expanded
        Array.from(document.querySelectorAll('.bub')).forEach((b,j)=>{if(j!==i)b.classList.remove('expanded');});
        onEnter(i);
      }
    });
  } else {
    el.addEventListener('mouseenter',()=>onEnter(i));
    el.addEventListener('mouseleave',()=>onLeave(i));
    el.addEventListener('click',()=>openD(d));
  }
  return el;
}

function build(){
  recompute();
  const stage=document.getElementById('stage');
  stage.style.width=SW+'px'; stage.style.height=SH+'px';
  stage.querySelectorAll('.bub').forEach(b=>b.remove());
  BASE.forEach((p,i)=>{live[i].x=p.x;live[i].y=p.y;});
  DATA.forEach((d,i)=>stage.appendChild(mk(d,i)));
  positionBadge();
}

function openD(d){
  hovIdx=-1;
  document.getElementById('mid').style.display='none';
  document.getElementById('g1').style.background=`radial-gradient(circle,${d.gd[0]}25 0%,transparent 70%)`;
  document.getElementById('g2').style.background=`radial-gradient(circle,${d.gd[3]}22 0%,transparent 70%)`;
  render(d);
}

function render(d){
  const dm=document.getElementById('dm');dm.style.display='block';
  dm.innerHTML=`<div class="dw" style="background:linear-gradient(150deg,${d.gd[0]},${d.gd[1]} 35%,${d.gd[2]} 65%,${d.gd[3]});">
    <div class="prg" style="width:260px;height:260px;top:-90px;right:-60px;opacity:.12;background:radial-gradient(circle,rgba(255,255,255,.3),${d.gd[0]});"></div>
    <div class="dh"><div class="dic"><svg width="20" height="20" viewBox="0 0 18 18" fill="none">${ICO[d.id]}</svg></div>
    <div style="flex:1;min-width:0;"><div class="dt">${d.label}</div><div class="ds">${d.sum}</div></div>
    <button class="bb" id="bb"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6L8 10" stroke="white" stroke-width="1.6" stroke-linecap="round"/></svg>Back</button></div>
    <div class="divl"></div><div id="sub"></div></div>`;
  document.getElementById('bb').addEventListener('click',cls);
  const sub=document.getElementById('sub');
  d.items.forEach((it,i)=>{
    const el=document.createElement('div');el.className='si';el.style.animationDelay=`${i*.05}s`;
    el.innerHTML=`<div class="sh"><span class="sn">${String(i+1).padStart(2,'0')}</span><span class="stl">${it.t}</span><svg class="sc" width="14" height="14" viewBox="0 0 13 13" fill="none"><path d="M4.5 3.5L8.5 6.5L4.5 9.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg></div><div class="sb"><p>${it.b}</p></div>`;
    el.querySelector('.sh').addEventListener('click',()=>{
      const bo=el.querySelector('.sb'),ch=el.querySelector('.sc'),op=bo.classList.contains('op');
      sub.querySelectorAll('.sb').forEach(b=>b.classList.remove('op'));
      sub.querySelectorAll('.sc').forEach(c=>c.classList.remove('op'));
      if(!op){bo.classList.add('op');ch.classList.add('op');}
    });
    sub.appendChild(el);
  });
}

function cls(){
  const dw=document.querySelector('.dw');
  if(dw){dw.style.transition='all .26s ease';dw.style.opacity='0';dw.style.transform='scale(.9) translateY(12px)';}
  setTimeout(()=>{
    document.getElementById('dm').style.display='none';document.getElementById('dm').innerHTML='';
    document.getElementById('mid').style.display='flex';
    document.querySelectorAll('.bub').forEach(b=>{b.classList.remove('dim');b.classList.remove('expanded');});
    build();
    document.getElementById('g1').style.background='radial-gradient(circle,rgba(29,158,117,.1) 0%,transparent 70%)';
    document.getElementById('g2').style.background='radial-gradient(circle,rgba(83,74,183,.09) 0%,transparent 70%)';
  },250);
}

// rebuild on resize
let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{
    if(hovIdx!==-1){hovIdx=-1;}
    build();
  },150);
});

build();
</script>
